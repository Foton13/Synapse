name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        pip install .[dev]
    - name: Lint with Ruff
      run: ruff check .
    - name: Type check with Mypy
      run: mypy src/
    - name: Test with pytest
      env:
        NEO4J_PASSWORD: "dummy_password_for_ci"
      run: pytest tests/
